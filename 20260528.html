<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>世界名畫虛擬展覽館</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>

<style>
#custom-text {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    z-index: 9999;
    font-family: sans-serif;
}

#custom-text h2 {
    margin-top: 0;
    text-align: center;
}

#closeBtn {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div id="custom-text">
    <h2 id="cardTitle"></h2>
    <p id="cardContent"></p>
    <button id="closeBtn">關閉</button>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    cursor="rayOrigin: mouse">
    
<a-scene>

    <a-assets>
        <img id="giotto" src="喬托.jpg">
        <img id="lamentation" src="哀悼耶穌.jpg">

        <img id="michelangelo" src="米開朗基羅.jpg">
        <img id="lastjudgment" src="最後的審判.jpg">

        <img id="rembrandt" src="林布蘭.jpg">
        <img id="nightwatch" src="夜巡.jpg">

        <img id="monet" src="莫內.jpg">
        <img id="impressionsunrise" src="日出.jpg">

        <img id="picasso" src="畢卡索.jpg">
        <img id="lesdemoiselles" src="亞維農的少女.jpg">
    </a-assets>

    <a-light type="ambient" intensity="0.8"></a-light>

    <a-camera position="0 1.6 0"></a-camera>

    <!-- 地板 -->
    <a-plane
        color="#eeeeee"
        width="10"
        height="10"
        rotation="-90 0 0"
        position="0 0 0">
    </a-plane>

    <!-- 天花板 -->
    <a-plane
        color="#000000"
        width="10"
        height="12"
        rotation="90 0 0"
        position="0 4 0">
    </a-plane>

    <!-- 前牆 -->
    <a-plane
        color="#ffffff"
        width="10"
        height="4"
        position="0 2 -5">
    </a-plane>

    <!-- 左牆 -->
    <a-plane
        color="#ffffff"
        width="10"
        height="4"
        rotation="0 90 0"
        position="-5 2 0">
    </a-plane>

    <!-- 右牆 -->
    <a-plane
        color="#ffffff"
        width="10"
        height="4"
        rotation="0 -90 0"
        position="5 2 0">
    </a-plane>

    <!-- 後牆 -->
    <a-plane
        color="#ffffff"
        width="10"
        height="4"
        rotation="0 180 0"
        position="0 2 5">
    </a-plane>

    <a-plane
        id="michelangeloCard"
        src="#michelangelo"
        width="1.3"
        height="1.6"
        position="-2 2 -4.9">
    </a-plane>

    <a-text
        value="米開朗基羅"
        color="black"
        align="center"
        position="-2 1 -4.8">
    </a-text>

    <a-plane
        id="lastjudgmentCard"
        src="#lastjudgment"
        width="2"
        height="1.3"
        position="2 2 -4.9">
    </a-plane>

    <a-text
        value="最後的審判"
        color="black"
        align="center"
        position="2 1 -4.8">
    </a-text>

    <a-plane
        id="giottoCard"
        src="#giotto"
        width="1.2"
        height="1.6"
        position="-4.9 2 1.8"
        rotation="0 90 0">
    </a-plane>

    <a-text
        value="喬托"
        color="black"
        align="center"
        rotation="0 90 0"
        position="-4.8 1 1">
    </a-text>

    <a-plane
        id="lamentationCard"
        src="#lamentation"
        width="2"
        height="1.8"
        position="-4.9 2 -1.8"
        rotation="0 90 0">
    </a-plane>

    <a-text
        value="哀悼耶穌"
        color="black"
        align="center"
        rotation="0 90 0"
        position="-4.8 1 -1">
    </a-text>

    <a-plane
        id="monetCard"
        src="#monet"
        width="1.2"
        height="1.6"
        position="4.9 2 -1.8"
        rotation="0 -90 0">
    </a-plane>

    <a-text
        value="莫內"
        color="black"
        align="center"
        rotation="0 -90 0"
        position="4.8 1 -1">
    </a-text>

    <a-plane
        id="impressionsunriseCard"
        src="#impressionsunrise"
        width="2"
        height="1.8"
        position="4.9 2 1.8"
        rotation="0 -90 0">
    </a-plane>

    <a-text
        value="印象日出"
        color="black"
        align="center"
        rotation="0 -90 0"
        position="4.8 1 1">
    </a-text>

    <a-plane
        id="rembrandtCard"
        src="#rembrandt"
        width="1.2"
        height="1.6"
        position="4 2 4.9"
        rotation="0 180 0">
    </a-plane>

    <a-text
        value="林布蘭"
        color="black"
        align="center"
        rotation="0 180 0"
        position="4 1 4.8">
    </a-text>

    <a-plane
        id="nightwatchCard"
        src="#nightwatch"
        width="2"
        height="1.8"
        position="1.6 2 4.9"
        rotation="0 180 0">
    </a-plane>

    <a-text
        value="夜巡"
        color="black"
        align="center"
        rotation="0 180 0"
        position="1.6 1 4.8">
    </a-text>

    <a-plane
        id="picassoCard"
        src="#picasso"
        width="1.2"
        height="1.6"
        position="-1.4 2 4.9"
        rotation="0 180 0">
    </a-plane>

    <a-text
        value="畢卡索"
        color="black"
        align="center"
        rotation="0 180 0"
        position="-1.4 1 4.8">
    </a-text>

    <a-plane
        id="lesdemoisellesCard"
        src="#lesdemoiselles"
        width="2"
        height="1.3"
        position="-3.8 2 4.9"
        rotation="0 180 0">
    </a-plane>

    <a-text
        value="亞維農的少女"
        color="black"
        align="center"
        rotation="0 180 0"
        position="-3.8 1 4.8">
    </a-text>

</a-scene>

<script>
window.addEventListener("load", () => {

    const card = document.querySelector("#custom-text");
    const title = document.querySelector("#cardTitle");
    const content = document.querySelector("#cardContent");

    function showCard(t, c) {
        title.innerText = t;
        content.innerText = c;
        card.style.display = "block";
    }

    document.querySelector("#closeBtn")
    .addEventListener("click", () => {
        card.style.display = "none";
    });

    document.querySelector("#michelangeloCard")
    .addEventListener("click", () => {
        showCard(
            "米開朗基羅",
            "1475－1564\n文藝復興三傑之一。\n作品特色在於精湛技巧與對人體結構的深刻理解。\n代表作：《最後的審判》。"
        );
    });

    document.querySelector("#lastjudgmentCard")
    .addEventListener("click", () => {
        showCard(
            "最後的審判",
            "1534－1541年\n媒材：濕壁畫\n館藏處：梵蒂岡西斯汀禮拜堂。\n畫面分為天上、人間與地獄，呈現審判與救贖的宗教主題。"
        );
    });

    document.querySelector("#giottoCard")
    .addEventListener("click", () => {
        showCard(
            "喬托",
            "1267－1337\n西方繪畫之父。\n他突破拜占庭平面風格，在繪畫中加入透視與景深，強調人物情感與立體感。"
        );
    });

    document.querySelector("#lamentationCard")
    .addEventListener("click", () => {
        showCard(
            "哀悼耶穌",
            "約1305年\n媒材：濕壁畫\n館藏處：義大利斯克羅威尼禮拜堂。\n畫面描繪耶穌遺體周圍眾人的哀傷。"
        );
    });

    document.querySelector("#monetCard")
    .addEventListener("click", () => {
        showCard(
            "莫內",
            "1840－1926\n印象派之父。\n擅長光與影的表現，常在不同時間與光線下描繪同一對象。"
        );
    });

    document.querySelector("#impressionsunriseCard")
    .addEventListener("click", () => {
        showCard(
            "印象日出",
            "1872年\n媒材：油彩、畫布\n館藏處：法國瑪摩丹莫內美術館。\n「印象派」之名即取自這幅畫的標題。"
        );
    });

    document.querySelector("#rembrandtCard")
    .addEventListener("click", () => {
        showCard(
            "林布蘭",
            "1606－1669\n荷蘭黃金時代代表畫家。\n擅長明暗對照法，重視光影、人物心理與人性表現。"
        );
    });

    document.querySelector("#nightwatchCard")
    .addEventListener("click", () => {
        showCard(
            "夜巡",
            "1642年\n媒材：油彩、畫布\n館藏處：荷蘭國家博物館。\n畫面以動態方式呈現民兵隊伍。"
        );
    });

    document.querySelector("#picassoCard")
    .addEventListener("click", () => {
        showCard(
            "畢卡索",
            "1881－1973\n立體派創始者。\n20世紀現代藝術的重要代表人物之一。"
        );
    });

    document.querySelector("#lesdemoisellesCard")
    .addEventListener("click", () => {
        showCard(
            "亞維農的少女",
            "1909年\n媒材：油彩、畫布\n館藏處：美國紐約現代藝術博物館。\n此作品被視為現代藝術的重要里程碑。"
        );
    });

});
</script>

</body>
</html>
